# Build + sign + publish the launcher installers (Windows NSIS + Linux .deb + macOS .dmg)
# and the updater manifest to a GitHub Release on THIS (public) repo. Windows auto-updates
# from the release; the .deb links the system WebKitGTK (no bundled-lib grey screen); Arch
# users get the AUR package (packaging/aur), which repackages this .deb. The macOS build is
# a UNIVERSAL .dmg (Intel + Apple Silicon), UNSIGNED — Gatekeeper shows a one-time
# "unidentified developer" prompt (right-click → Open, or `xattr -dr com.apple.quarantine`).
# Notarization would need the $99/yr Apple Developer Program (APPLE_* secrets); not set up.
#
# Cut a release by pushing a tag:   git tag v0.1.20 && git push origin v0.1.20
# (bump the version in package.json + src-tauri/Cargo.toml + tauri.conf.json first).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the launcher-update signing key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's passphrase (empty string for now)
name: Release launcher

on:
  workflow_dispatch:        # also runnable from the Actions tab
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # create the Release + upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # bundle.targets in tauri.conf is global, so pick the right bundle per OS here
        # (--bundles overrides it). macOS builds a single UNIVERSAL .dmg for Intel+ARM.
        # ubuntu-24.04 ships WebKitGTK 4.1, so the .deb depends on libwebkit2gtk-4.1-0
        # (the package links system WebKit → always matches the user's GPU stack).
        include:
          - os: ubuntu-24.04
            args: '--bundles deb'
          - os: windows-latest
            args: '--bundles nsis'
          - os: macos-latest
            args: '--target universal-apple-darwin --bundles app,dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux only: the system libs Tauri v2 needs to build the .deb.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev file

      - uses: dtolnay/rust-toolchain@stable

      # macOS universal build needs both arch targets so lipo can fuse them.
      - name: Add macOS universal Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install launcher JS deps (Tauri CLI)
        run: npm ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Legends Awakened Launcher ${{ github.ref_name }}'
          args: ${{ matrix.args }}
          releaseBody: |
            Windows: NSIS installer (auto-updates from this release).
            Debian/Ubuntu: native `.deb` (links system WebKitGTK — no grey screen).
            Arch/CachyOS/Manjaro: `yay -S legends-awakened-launcher-bin` (AUR).
            macOS: universal `.dmg` (Intel + Apple Silicon), unsigned — on first open,
            right-click the app → Open (or `xattr -dr com.apple.quarantine` the .app).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
